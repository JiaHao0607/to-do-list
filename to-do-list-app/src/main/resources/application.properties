spring.application.name=to-do-list-app
spring.config.import=optional:file:.env[.properties]

# Property to specify database and driver; todolist database name; MySQL driver
spring.datasource.url=jdbc:mysql://localhost:3306/todolist

# Properties to specify data for database authentication and authorisation
spring.datasource.username=${MySQL_Username}
spring.datasource.password=${MySQL_Password}

# Property to handle data
# update - updates remaining data
# create-drop - create new tables and deletes existing data on termination of the program everytime
spring.jpa.hibernate.ddl-auto=update

# Driver class for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Show MySQL whenever any query is executed by hibernate
spring.jpa.show-sql: true